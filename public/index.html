    <!-- Primary SEO -->

    <!-- Additional Meta Tags for Better SEO -->
    <meta name="application-name" content="DocuLeader" />

    <link rel="preconnect" href="http://localhost:8080" />
    <link rel="dns-prefetch" href="http://localhost:8080" />

    <!-- Structured Data / JSON-LD for Rich Search Results -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "DocuLeader",
        "applicationCategory": "BusinessApplication",
        "applicationSubCategory": "Document Management",
        "operatingSystem": "Web",
        "description": "AI-powered document intelligence platform that reads, understands, and extracts data from documents. Features include semantic search, invoice extraction, payment tracking, and automated reminders.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "150"
        },
        "featureList": [
          "AI Document Analysis",
          "Semantic Search",
          "Invoice Extraction",
          "Payment Tracking",
          "Automated Reminders",
          "Multi-format Support",
          "Secure Storage"
        ],
        "screenshot": "https://your-domain.com/doculeader/screenshot.png",
        "softwareVersion": "1.0.0",
        "creator": {
          "@type": "Person",
          "name": "Maninder Singh"
        }
      }
    </script>

    <!-- Additional structured data for WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "DocuLeader",
        "url": "https://your-domain.com/doculeader",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://your-domain.com/doculeader/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
